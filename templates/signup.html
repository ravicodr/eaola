{% extends "base.html" %}
{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center; padding:1rem;">
<div class="card" style="width:100%; max-width:480px; padding:2.5rem;">

    <div style="text-align:center; margin-bottom:2rem;">
        <div style="font-size:3rem;">🎓</div>
        <h2 style="margin:0.5rem 0 0.25rem;">Create Account</h2>
        <p style="color:#666; margin:0; font-size:0.9rem;">Join InsightClass Monitor</p>
    </div>

    <form method="POST" action="/signup" id="signupForm">

        <div style="margin-bottom:1rem;">
            <label style="display:block; font-weight:600; margin-bottom:5px; color:#343a40;">👤 Username</label>
            <input name="username" placeholder="e.g. john_doe" required
                   style="width:94%; padding:12px; border:1.5px solid #ddd; border-radius:8px; font-size:1rem; transition:0.2s;"
                   onfocus="this.style.borderColor='#007bff'" onblur="this.style.borderColor='#ddd'">
            <small style="color:#999;">At least 3 characters, no spaces</small>
        </div>

        <div style="margin-bottom:1rem;">
            <label style="display:block; font-weight:600; margin-bottom:5px; color:#343a40;">📧 Email Address</label>
            <input type="email" name="email" placeholder="e.g. john@example.com" required
                   style="width:94%; padding:12px; border:1.5px solid #ddd; border-radius:8px; font-size:1rem; transition:0.2s;"
                   onfocus="this.style.borderColor='#007bff'" onblur="this.style.borderColor='#ddd'">
            <small style="color:#999;">Used for password recovery</small>
        </div>

        <div style="margin-bottom:1rem;">
            <label style="display:block; font-weight:600; margin-bottom:5px; color:#343a40;">🔒 Password</label>
            <div style="position:relative;">
                <input type="password" name="password" id="password" placeholder="At least 4 characters" required
                       style="width:94%; padding:12px; border:1.5px solid #ddd; border-radius:8px; font-size:1rem; transition:0.2s;"
                       onfocus="this.style.borderColor='#007bff'" onblur="this.style.borderColor='#ddd'"
                       oninput="checkStrength(this.value)">
            </div>
            <div id="strengthBar" style="height:4px; border-radius:2px; margin-top:5px; background:#eee; transition:0.3s;">
                <div id="strengthFill" style="height:100%; border-radius:2px; width:0%; transition:0.3s;"></div>
            </div>
            <small id="strengthText" style="color:#999;"></small>
        </div>

        <div style="margin-bottom:1rem;">
            <label style="display:block; font-weight:600; margin-bottom:5px; color:#343a40;">🔒 Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password" placeholder="Re-enter your password" required
                   style="width:94%; padding:12px; border:1.5px solid #ddd; border-radius:8px; font-size:1rem; transition:0.2s;"
                   onfocus="this.style.borderColor='#007bff'" onblur="this.style.borderColor='#ddd'"
                   oninput="checkMatch()">
            <small id="matchText" style="color:#999;"></small>
        </div>

        <div style="margin-bottom:1.5rem;">
            <label style="display:block; font-weight:600; margin-bottom:5px; color:#343a40;">🎭 I am a...</label>
            <div style="display:flex; gap:10px;">
                <label style="flex:1; display:flex; align-items:center; gap:8px; padding:12px; border:1.5px solid #ddd; border-radius:8px; cursor:pointer; transition:0.2s;" id="studentLabel">
                    <input type="radio" name="role" value="student" checked onchange="selectRole('student')">
                    <span>🧑‍🎓 Student</span>
                </label>
                <label style="flex:1; display:flex; align-items:center; gap:8px; padding:12px; border:1.5px solid #ddd; border-radius:8px; cursor:pointer; transition:0.2s;" id="teacherLabel">
                    <input type="radio" name="role" value="teacher" onchange="selectRole('teacher')">
                    <span>👨‍🏫 Teacher</span>
                </label>
            </div>
        </div>

        {% if error %}
        <div style="background:#fff3cd; border:1px solid #ffc107; color:#856404; padding:12px; border-radius:8px; margin-bottom:1rem; font-size:0.9rem;">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <button type="submit" class="btn" style="width:100%; padding:14px; font-size:1rem; border-radius:8px;">
            🚀 Create Account
        </button>
    </form>

    <div style="text-align:center; margin-top:1.5rem; color:#666; font-size:0.9rem;">
        Already have an account? <a href="/" style="font-weight:bold; color:#007bff;">Login here</a>
    </div>
</div>
</div>

<script>
function checkStrength(pass) {
    const bar  = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let score  = 0;
    if (pass.length >= 4)  score++;
    if (pass.length >= 8)  score++;
    if (/[A-Z]/.test(pass)) score++;
    if (/[0-9]/.test(pass)) score++;
    if (/[^A-Za-z0-9]/.test(pass)) score++;

    const levels = [
        { pct: '0%',   color: '#eee',    label: '' },
        { pct: '25%',  color: '#dc3545', label: 'Weak' },
        { pct: '50%',  color: '#fd7e14', label: 'Fair' },
        { pct: '75%',  color: '#ffc107', label: 'Good' },
        { pct: '100%', color: '#28a745', label: 'Strong 💪' },
    ];
    const lvl = levels[Math.min(score, 4)];
    bar.style.width     = lvl.pct;
    bar.style.background = lvl.color;
    text.innerText      = lvl.label;
    text.style.color    = lvl.color;
}

function checkMatch() {
    const p1   = document.getElementById('password').value;
    const p2   = document.getElementById('confirm_password').value;
    const text = document.getElementById('matchText');
    if (p2.length === 0) { text.innerText = ''; return; }
    if (p1 === p2) {
        text.innerText = '✅ Passwords match';
        text.style.color = '#28a745';
    } else {
        text.innerText = '❌ Passwords do not match';
        text.style.color = '#dc3545';
    }
}

function selectRole(role) {
    document.getElementById('studentLabel').style.borderColor = role==='student' ? '#007bff' : '#ddd';
    document.getElementById('teacherLabel').style.borderColor = role==='teacher' ? '#007bff' : '#ddd';
    document.getElementById('studentLabel').style.background  = role==='student' ? '#e3f2fd' : 'white';
    document.getElementById('teacherLabel').style.background  = role==='teacher' ? '#e3f2fd' : 'white';
}
// Set default highlight
selectRole('student');
</script>
{% endblock %}
