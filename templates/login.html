<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAOLA - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#0d1b4b 0%,#080e2b 55%,#040810 100%);overflow:hidden;}
        .star{position:fixed;background:white;border-radius:50%;animation:twinkle linear infinite;}
        @keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.9}}
        .card{background:rgba(255,255,255,0.04);backdrop-filter:blur(30px);border:1px solid rgba(100,160,255,0.18);border-radius:30px;padding:2.5rem 2rem;width:92%;max-width:400px;position:relative;z-index:10;box-shadow:0 0 60px rgba(66,133,244,0.12),0 25px 60px rgba(0,0,0,0.5);animation:fadeIn .6s ease-out;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#1565c0,#42a5f5);margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:48px;box-shadow:0 0 35px rgba(66,165,245,0.7),0 0 70px rgba(66,165,245,0.3);animation:avatarGlow 3s ease-in-out infinite;}
        @keyframes avatarGlow{0%,100%{box-shadow:0 0 35px rgba(66,165,245,0.7),0 0 70px rgba(66,165,245,0.3)}50%{box-shadow:0 0 55px rgba(66,165,245,1),0 0 100px rgba(66,165,245,0.5)}}
        .brand{font-size:2.4rem;font-weight:900;color:#64b5f6;letter-spacing:6px;text-align:center;text-shadow:0 0 25px rgba(100,181,246,0.8);margin-bottom:.2rem;}
        .brand-sub{text-align:center;color:rgba(255,255,255,0.4);font-size:.72rem;letter-spacing:.5px;margin-bottom:2rem;}
        .alert-error{background:rgba(220,53,69,0.12);border:1px solid rgba(220,53,69,0.35);color:#ff8a80;padding:10px 15px;border-radius:12px;font-size:.83rem;margin-bottom:1rem;text-align:center;}
        .alert-success{background:rgba(40,167,69,0.12);border:1px solid rgba(40,167,69,0.35);color:#69f0ae;padding:10px 15px;border-radius:12px;font-size:.83rem;margin-bottom:1rem;text-align:center;}
        .field{position:relative;margin-bottom:1rem;}
        .field i{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.35);font-size:.88rem;}
        .field input{width:100%;padding:14px 45px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(100,160,255,0.18);border-radius:50px;color:white;font-size:.93rem;font-family:'Poppins',sans-serif;outline:none;transition:.3s;}
        .field input::placeholder{color:rgba(255,255,255,0.3);}
        .field input:focus{border-color:#42a5f5;background:rgba(66,165,245,0.07);box-shadow:0 0 18px rgba(66,165,245,0.18);}
        .eye-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.35);cursor:pointer;background:none;border:none;font-size:.88rem;padding:4px;}
        .login-btn{width:100%;padding:15px;background:linear-gradient(135deg,#2979ff,#42a5f5);color:white;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:700;border:none;border-radius:50px;cursor:pointer;letter-spacing:2px;margin:.4rem 0 1.4rem;box-shadow:0 8px 25px rgba(41,121,255,0.45);transition:transform .2s,box-shadow .2s;}
        .login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(41,121,255,0.7);}
        .link-row{text-align:center;color:rgba(255,255,255,0.4);font-size:.84rem;margin-bottom:.6rem;}
        .link-row a{color:#64b5f6;text-decoration:none;font-weight:600;}
        .divider{text-align:center;color:rgba(255,255,255,0.12);font-size:.75rem;margin:.5rem 0;letter-spacing:3px;}
        .hint{text-align:center;font-size:.7rem;color:rgba(255,255,255,0.2);margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.06);}
    </style>
</head>
<body>
    <div id="starsContainer"></div>
    <div class="card">
        <div class="avatar">🎓</div>
        <div class="brand">EAOLA</div>
        <div class="brand-sub">Emotion Aware Online Learning Assistant</div>

        {% if error %}
            {% if '✅' in error %}
            <div class="alert-success">{{ error }}</div>
            {% else %}
            <div class="alert-error">⚠️ {{ error }}</div>
            {% endif %}
        {% endif %}

        <form method="POST" action="/login">
            <div class="field">
                <i class="fas fa-user"></i>
                <input name="username" placeholder="Username" required autocomplete="off">
            </div>
            <div class="field">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="pwdInput" placeholder="Password" required>
                <button type="button" class="eye-btn" onclick="togglePwd()"><i class="fas fa-eye" id="eyeIcon"></i></button>
            </div>
            <button type="submit" class="login-btn">LOG IN</button>
        </form>

        <div class="link-row"><a href="/forgot_password">Forgot password?</a></div>
        <div class="divider">───────────────</div>
        <div class="link-row">Don't have an account? <a href="/signup">Sign Up</a></div>
        
    </div>

    <script>
        const sc=document.getElementById('starsContainer');
        for(let i=0;i<70;i++){
            const s=document.createElement('div');s.className='star';
            const sz=Math.random()*2.5+.5;
            s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*5}s;animation-duration:${2+Math.random()*3}s;`;
            sc.appendChild(s);
        }
        function togglePwd(){
            const i=document.getElementById('pwdInput'),e=document.getElementById('eyeIcon');
            i.type=i.type==='password'?'text':'password';
            e.className=i.type==='password'?'fas fa-eye':'fas fa-eye-slash';
        }
    </script>
</body>
</html>
