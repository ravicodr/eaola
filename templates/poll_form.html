{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 3rem auto; text-align: center; padding: 2rem;">
    <h2>📊 Create New Poll</h2>
    <form method="POST" action="/launch_poll">
        <input name="question" placeholder="Question (e.g. Is the topic clear?)" required style="width:90%; padding:10px; margin:5px;"><br>
        <div style="text-align:left; width:90%; margin:10px auto 2px; font-size:0.8rem; color:#666; font-weight:bold;">OPTIONS:</div>
        <input name="opt1" placeholder="Option 1 (e.g. Yes, I understand)" required style="width:90%; padding:10px; margin:5px;"><br>
        <input name="opt2" placeholder="Option 2 (e.g. No, I'm confused)" required style="width:90%; padding:10px; margin:5px;"><br>
        <input name="opt3" placeholder="Option 3 (Optional)" style="width:90%; padding:10px; margin:5px;"><br>
        <input name="opt4" placeholder="Option 4 (Optional)" style="width:90%; padding:10px; margin:5px;"><br>
        <br>
        <button class="btn" style="background:#007bff;">🚀 Launch Poll</button>
    </form>
    <br>
    <a href="/teacher" style="color:#666;">← Cancel</a>
</div>
{% endblock %}
